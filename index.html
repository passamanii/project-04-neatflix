<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/profiles.css">
    <link rel="icon" sizes="48x48" type="image/ico" href="src/images/favicon/favicon.ico">
    
    <title>Netflix</title>
</head>

<body>
    
    <main>

        <h1>Quem está assistindo?</h1>
        <ul class = "profiles">
            
            <li class = "profile">
                <a href="src/pages/catalogo.html">    
                    <img src="src/images/profile/profile-1.png" alt="Profile 1">
                </a>
                    <figcaption class="profile_cap">João</figcaption>
            </li>
            
            <li class = "profile">
                <a href="src/pages/catalogo.html">
                    <img src="src/images/profile/profile-2.png" alt="Profile 2">
                </a>
                    <figcaption class="profile_cap">Júnior</figcaption>
            </li>
            
            <li class="profile">
                <a href="src/pages/catalogo.html">
                    <img src="src/images/profile/profile-3.png" alt="Profile 3">
                </a>
                    <figcaption class="profile_cap">Sarah</figcaption>
            </li>
            
            <li class="profile">
                <a href="src/pages/catalogo.html">
                    <img src="src/images/profile/profile-4.png" alt="Profile 4">
                </a>
                    <figcaption class="profile_cap">Luís</figcaption>
            </li>
        </ul>

    </main>

    <button id="theme_toggle"></button>
    
    <script src="src/scripts/profiles.js"></script>
    <script>
        // Sistema de armazenamento do perfil ativo no LocalStorage
        document.addEventListener('DOMContentLoaded', () => {
            const perfis = document.querySelectorAll('.profile');
            
            perfis.forEach(perfil => {
                const link = perfil.querySelector('a');
                const img = perfil.querySelector('img');
                const nome = perfil.querySelector('.profile_cap').textContent;
                const imagemSrc = img.src;
                
                link.addEventListener('click', (e) => {
                    // Armazena o nome e a imagem do perfil selecionado
                    localStorage.setItem('perfilAtivoNome', nome);
                    localStorage.setItem('perfilAtivoImagem', imagemSrc);
                });
            });
        });
    </script>
</body>
</html>
